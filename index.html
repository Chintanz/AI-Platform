<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        html, body, #app {
            height: 100%;
            width: 100%;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .user-message .message-content {
            background-color: #2563eb;
            color: white;
            border-radius: 1.25rem 0.25rem 1.25rem 1.25rem;
        }

        .ai-message .message-content {
            background-color: #e5e7eb;
            color: #1f2937;
            border-radius: 0.25rem 1.25rem 1.25rem 1.25rem;
        }

        .dark-mode .user-message .message-content {
            background-color: #1e40af;
        }

        .dark-mode .ai-message .message-content {
            background-color: #374151;
            color: #f3f4f6;
        }

        .message-content code {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        .dark-mode .message-content pre {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .input-area {
            padding: 1rem;
            border-top: 1px solid #e5e7eb;
            background-color: white;
            flex-shrink: 0;
        }

        .dark-mode .input-area {
            background-color: #1f2937;
            border-top-color: #374151;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 1.5rem;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        .dark-mode .input-field {
            background-color: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }

        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .icon-button {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .icon-button:hover {
            background-color: #f3f4f6;
            transform: scale(1.05);
        }

        .dark-mode .icon-button:hover {
            background-color: #4b5563;
        }

        .send-button {
            background-color: #2563eb;
            color: white;
        }

        .send-button:hover {
            background-color: #1d4ed8;
        }

        .send-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .sidebar {
            width: 250px;
            background-color: #f9fafb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .dark-mode .sidebar {
            background-color: #111827;
            border-right-color: #374151;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .dark-mode .sidebar-header {
            border-bottom-color: #374151;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background-color: #1d4ed8;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .chat-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background-color: white;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dark-mode .chat-item {
            background-color: #1f2937;
        }

        .chat-item:hover {
            background-color: #f3f4f6;
        }

        .dark-mode .chat-item:hover {
            background-color: #374151;
        }

        .chat-item.active {
            background-color: #dbeafe;
            border-color: #2563eb;
        }

        .dark-mode .chat-item.active {
            background-color: #1e3a8a;
            border-color: #3b82f6;
        }

        .chat-item-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .chat-item-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
        }

        .chat-item:hover .chat-item-actions {
            opacity: 1;
        }

        .chat-item-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.25rem;
            color: #6b7280;
        }

        .dark-mode .chat-item-action {
            color: #9ca3af;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .dark-mode .modal-content {
            background-color: #1f2937;
            color: #f3f4f6;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
        }

        .dark-mode .modal-close {
            color: #9ca3af;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }

        .dark-mode .form-input, .dark-mode .form-textarea {
            background-color: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: #e5e7eb;
            color: #1f2937;
        }

        .dark-mode .btn-secondary {
            background-color: #374151;
            color: #f3f4f6;
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .dark-mode .btn-secondary:hover {
            background-color: #4b5563;
        }

        .uploader-menu {
            position: absolute;
            bottom: 100%;
            left: 0;
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
            min-width: 200px;
            margin-bottom: 0.5rem;
        }

        .dark-mode .uploader-menu {
            background-color: #1f2937;
            border-color: #374151;
        }

        .uploader-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .dark-mode .uploader-item {
            border-bottom-color: #374151;
        }

        .uploader-item:last-child {
            border-bottom: none;
        }

        .uploader-item:hover {
            background-color: #f3f4f6;
        }

        .dark-mode .uploader-item:hover {
            background-color: #374151;
        }

        .app-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
            min-width: 200px;
            margin-bottom: 0.5rem;
        }

        .dark-mode .app-menu {
            background-color: #1f2937;
            border-color: #374151;
        }

        .app-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .dark-mode .app-item {
            border-bottom-color: #374151;
        }

        .app-item:last-child {
            border-bottom: none;
        }

        .app-item:hover {
            background-color: #f3f4f6;
        }

        .dark-mode .app-item:hover {
            background-color: #374151;
        }

        .hidden {
            display: none !important;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .typing-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background-color: currentColor;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-0.5rem);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 999;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                flex: 1;
            }

            .message-content {
                max-width: 85%;
            }

            .hamburger {
                display: flex;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 998;
            }

            .sidebar-overlay.active {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .hamburger {
                display: none;
            }

            .sidebar-overlay {
                display: none !important;
            }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.2rem;
            color: #6b7280;
        }

        .dark-mode {
            background-color: #111827;
            color: #f3f4f6;
        }

        .dark-mode .chat-container {
            background-color: #111827;
        }

        .dark-mode .messages-area {
            background-color: #111827;
        }

        .relative {
            position: relative;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading App...</div>
    <div id="app" class="hidden"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            apiKey: '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',
            apiEndpoint: 'https://openrouter.ai/api/v1/chat/completions',
            defaultModel: 'deepseek/deepseek-r1:free',
            maxTokens: 2000,
        };

        // ==================== STATE MANAGEMENT ====================
        const state = {
            chats: [],
            currentChatId: null,
            darkMode: localStorage.getItem('darkMode') === 'true',
            apiKey: localStorage.getItem('apiKey') || CONFIG.apiKey,
            model: localStorage.getItem('model') || CONFIG.defaultModel,
            systemPrompt: localStorage.getItem('systemPrompt') || 'You are a helpful AI assistant.',
            sidebarOpen: false,
        };

        // ==================== UTILITY FUNCTIONS ====================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function saveState() {
            localStorage.setItem('chats', JSON.stringify(state.chats));
            localStorage.setItem('currentChatId', state.currentChatId);
            localStorage.setItem('darkMode', state.darkMode);
            localStorage.setItem('apiKey', state.apiKey);
            localStorage.setItem('model', state.model);
            localStorage.setItem('systemPrompt', state.systemPrompt);
        }

        function loadState() {
            const savedChats = localStorage.getItem('chats');
            if (savedChats) {
                state.chats = JSON.parse(savedChats);
            }
            const savedChatId = localStorage.getItem('currentChatId');
            if (savedChatId) {
                state.currentChatId = savedChatId;
            }
        }

        function getCurrentChat() {
            return state.chats.find(chat => chat.id === state.currentChatId);
        }

        function createNewChat() {
            const newChat = {
                id: generateId(),
                title: 'New Chat',
                messages: [],
                createdAt: Date.now(),
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            return newChat;
        }

        // ==================== MARKDOWN & CODE RENDERING ====================
        function renderMarkdown(text) {
            const renderer = new marked.Renderer();
            renderer.code = (code) => {
                const highlighted = hljs.highlightAuto(code.text).value;
                return `<pre><code class="hljs">${highlighted}</code></pre>`;
            };
            renderer.codespan = (code) => {
                return `<code>${code.text}</code>`;
            };
            marked.setOptions({ renderer });
            return marked.parse(text);
        }

        // ==================== DOM ELEMENTS ====================
        function createAppHTML() {
            return `
                <div class="flex h-screen overflow-hidden">
                    <!-- Sidebar Overlay -->
                    <div id="sidebarOverlay" class="sidebar-overlay"></div>

                    <!-- Sidebar -->
                    <div id="sidebar" class="sidebar">
                        <div class="sidebar-header">
                            <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
                        </div>
                        <div class="chat-list" id="chatList"></div>
                        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                            <button id="settingsBtn" class="w-full px-3 py-2 text-left text-sm font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition">⚙️ Settings</button>
                            <button id="darkModeBtn" class="w-full px-3 py-2 text-left text-sm font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition mt-2">🌙 Dark Mode</button>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="flex-1 flex flex-col overflow-hidden">
                        <!-- Header -->
                        <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3 flex items-center justify-between">
                            <button id="hamburger" class="hamburger text-xl">☰</button>
                            <h1 class="text-lg font-semibold">AI Chat</h1>
                            <div></div>
                        </div>

                        <!-- Messages Area -->
                        <div id="messagesArea" class="messages-area">
                            <div class="flex-1 flex items-center justify-center text-gray-400">
                                <div class="text-center">
                                    <div class="text-4xl mb-2">💬</div>
                                    <p>Start a conversation</p>
                                </div>
                            </div>
                        </div>

                        <!-- Input Area -->
                        <div class="input-area">
                            <div class="input-wrapper relative">
                                <button id="uploaderBtn" class="icon-button relative">
                                    <span>➕</span>
                                    <div id="uploaderMenu" class="uploader-menu hidden">
                                        <div class="uploader-item" onclick="handleUpload('image')">
                                            <span>🖼️</span>
                                            <span>Upload Image</span>
                                        </div>
                                        <div class="uploader-item" onclick="handleUpload('video')">
                                            <span>🎥</span>
                                            <span>Upload Video</span>
                                        </div>
                                        <div class="uploader-item" onclick="handleUpload('file')">
                                            <span>📄</span>
                                            <span>Upload File</span>
                                        </div>
                                        <div class="uploader-item" onclick="handleUpload('audio')">
                                            <span>🎵</span>
                                            <span>Upload Audio</span>
                                        </div>
                                    </div>
                                </button>
                                <textarea id="inputField" class="input-field" placeholder="Type your message..." rows="1"></textarea>
                                <button id="appConnectionBtn" class="icon-button relative">
                                    <span>🔗</span>
                                    <div id="appMenu" class="app-menu hidden">
                                        <div class="app-item" onclick="connectApp('google')">
                                            <span>🔍</span>
                                            <span>Google Search</span>
                                        </div>
                                        <div class="app-item" onclick="connectApp('slack')">
                                            <span>💬</span>
                                            <span>Slack</span>
                                        </div>
                                        <div class="app-item" onclick="connectApp('github')">
                                            <span>🐙</span>
                                            <span>GitHub</span>
                                        </div>
                                        <div class="app-item" onclick="connectApp('notion')">
                                            <span>📝</span>
                                            <span>Notion</span>
                                        </div>
                                        <div class="app-item" onclick="connectApp('zapier')">
                                            <span>⚡</span>
                                            <span>Zapier</span>
                                        </div>
                                    </div>
                                </button>
                                <button id="sendBtn" class="icon-button send-button">
                                    <span>➤</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Settings Modal -->
                <div id="settingsModal" class="modal">
                    <div class="modal-content relative">
                        <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
                        <div class="modal-header">Settings</div>
                        
                        <div class="form-group">
                            <label class="form-label">OpenRouter API Key</label>
                            <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-or-v1-...">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Model</label>
                            <input type="text" id="modelInput" class="form-input" placeholder="deepseek/deepseek-r1:free">
                        </div>

                        <div class="form-group">
                            <label class="form-label">System Prompt</label>
                            <textarea id="systemPromptInput" class="form-textarea" placeholder="You are a helpful AI assistant."></textarea>
                        </div>

                        <div class="button-group">
                            <button class="btn btn-secondary" onclick="closeModal('settingsModal')">Cancel</button>
                            <button class="btn btn-primary" onclick="saveSettings()">Save</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== RENDERING FUNCTIONS ====================
        function renderChatList() {
            const chatList = document.getElementById('chatList');
            if (!chatList) return;

            chatList.innerHTML = state.chats.map(chat => `
                <div class="chat-item ${chat.id === state.currentChatId ? 'active' : ''}" onclick="selectChat('${chat.id}')">
                    <span class="chat-item-text">${chat.title}</span>
                    <div class="chat-item-actions">
                        <button class="chat-item-action" onclick="event.stopPropagation(); renameChat('${chat.id}')" title="Rename">✏️</button>
                        <button class="chat-item-action" onclick="event.stopPropagation(); deleteChat('${chat.id}')" title="Delete">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMessages() {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;

            const chat = getCurrentChat();
            if (!chat) {
                messagesArea.innerHTML = `
                    <div class="flex-1 flex items-center justify-center text-gray-400">
                        <div class="text-center">
                            <div class="text-4xl mb-2">💬</div>
                            <p>Start a conversation</p>
                        </div>
                    </div>
                `;
                return;
            }

            messagesArea.innerHTML = chat.messages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user-message' : 'ai-message'}">
                    <div class="message-content">
                        ${msg.role === 'user' ? msg.content : renderMarkdown(msg.content)}
                    </div>
                </div>
            `).join('');

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function addMessage(role, content) {
            const chat = getCurrentChat();
            if (!chat) return;

            chat.messages.push({ role, content });
            saveState();
            renderMessages();
        }

        // ==================== API COMMUNICATION ====================
        async function sendMessage(userMessage) {
            if (!userMessage.trim()) return;

            addMessage('user', userMessage);
            document.getElementById('inputField').value = '';
            document.getElementById('inputField').style.height = 'auto';

            const chat = getCurrentChat();
            if (!chat) return;

            // Update chat title if it's the first message
            if (chat.messages.length === 1) {
                chat.title = userMessage.substring(0, 30) + (userMessage.length > 30 ? '...' : '');
                saveState();
                renderChatList();
            }

            // Add typing indicator
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai-message';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const response = await fetch(state.apiKey ? CONFIG.apiEndpoint : '#', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`,
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: 'system', content: state.systemPrompt },
                            ...chat.messages.map(msg => ({ role: msg.role, content: msg.content }))
                        ],
                        max_tokens: CONFIG.maxTokens,
                        stream: true,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.statusText}`);
                }

                typingDiv.remove();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let aiMessage = '';

                const messageDiv = document.createElement('div');
                messageDiv.className = 'message ai-message';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                messageDiv.appendChild(contentDiv);
                messagesArea.appendChild(messageDiv);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const json = JSON.parse(line.slice(6));
                                const delta = json.choices?.[0]?.delta?.content;
                                if (delta) {
                                    aiMessage += delta;
                                    contentDiv.innerHTML = renderMarkdown(aiMessage);
                                    messagesArea.scrollTop = messagesArea.scrollHeight;
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }

                addMessage('ai', aiMessage);
            } catch (error) {
                typingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message ai-message';
                errorDiv.innerHTML = `
                    <div class="message-content">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
                messagesArea.appendChild(errorDiv);
                console.error('API Error:', error);
            }
        }

        // ==================== CHAT MANAGEMENT ====================
        function selectChat(chatId) {
            state.currentChatId = chatId;
            saveState();
            renderChatList();
            renderMessages();
            closeSidebar();
        }

        function deleteChat(chatId) {
            if (confirm('Delete this chat?')) {
                state.chats = state.chats.filter(chat => chat.id !== chatId);
                if (state.currentChatId === chatId) {
                    state.currentChatId = state.chats[0]?.id || null;
                    if (!state.currentChatId) {
                        createNewChat();
                    }
                }
                saveState();
                renderChatList();
                renderMessages();
            }
        }

        function renameChat(chatId) {
            const chat = state.chats.find(c => c.id === chatId);
            if (!chat) return;

            const newTitle = prompt('New chat title:', chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderChatList();
            }
        }

        // ==================== SETTINGS & MODALS ====================
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                if (modalId === 'settingsModal') {
                    document.getElementById('apiKeyInput').value = state.apiKey;
                    document.getElementById('modelInput').value = state.model;
                    document.getElementById('systemPromptInput').value = state.systemPrompt;
                }
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
            }
        }

        function saveSettings() {
            state.apiKey = document.getElementById('apiKeyInput').value || CONFIG.apiKey;
            state.model = document.getElementById('modelInput').value || CONFIG.defaultModel;
            state.systemPrompt = document.getElementById('systemPromptInput').value;
            saveState();
            closeModal('settingsModal');
            alert('Settings saved!');
        }

        // ==================== DARK MODE ====================
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            saveState();
            applyDarkMode();
        }

        function applyDarkMode() {
            const app = document.getElementById('app');
            if (state.darkMode) {
                app.classList.add('dark-mode');
            } else {
                app.classList.remove('dark-mode');
            }
        }

        // ==================== SIDEBAR MANAGEMENT ====================
        function openSidebar() {
            state.sidebarOpen = true;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.classList.add('active');
            if (overlay) overlay.classList.add('active');
        }

        function closeSidebar() {
            state.sidebarOpen = false;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.classList.remove('active');
            if (overlay) overlay.classList.remove('active');
        }

        // ==================== FILE UPLOAD & APP CONNECTION ====================
        function handleUpload(type) {
            const input = document.createElement('input');
            input.type = 'file';
            
            if (type === 'image') {
                input.accept = 'image/*';
            } else if (type === 'video') {
                input.accept = 'video/*';
            } else if (type === 'audio') {
                input.accept = 'audio/*';
            }

            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const message = `[${type.toUpperCase()}] ${file.name}`;
                        document.getElementById('inputField').value = message;
                        console.log('File loaded:', file.name, 'Type:', type);
                    };
                    reader.readAsDataURL(file);
                }
            };

            input.click();
            toggleUploaderMenu();
        }

        function connectApp(appName) {
            alert(`Connecting to ${appName}...`);
            console.log('App connection initiated:', appName);
            toggleAppMenu();
        }

        function toggleUploaderMenu() {
            const menu = document.getElementById('uploaderMenu');
            if (menu) {
                menu.classList.toggle('hidden');
            }
        }

        function toggleAppMenu() {
            const menu = document.getElementById('appMenu');
            if (menu) {
                menu.classList.toggle('hidden');
            }
        }

        // ==================== AUTO-RESIZE TEXTAREA ====================
        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // ==================== EVENT LISTENERS ====================
        function attachEventListeners() {
            // New Chat
            const newChatBtn = document.getElementById('newChatBtn');
            if (newChatBtn) {
                newChatBtn.addEventListener('click', () => {
                    createNewChat();
                    renderChatList();
                    renderMessages();
                    closeSidebar();
                });
            }

            // Settings
            const settingsBtn = document.getElementById('settingsBtn');
            if (settingsBtn) {
                settingsBtn.addEventListener('click', () => openModal('settingsModal'));
            }

            // Dark Mode
            const darkModeBtn = document.getElementById('darkModeBtn');
            if (darkModeBtn) {
                darkModeBtn.addEventListener('click', toggleDarkMode);
            }

            // Input Field
            const inputField = document.getElementById('inputField');
            if (inputField) {
                inputField.addEventListener('input', () => autoResizeTextarea(inputField));
                inputField.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage(inputField.value);
                    }
                });
            }

            // Send Button
            const sendBtn = document.getElementById('sendBtn');
            if (sendBtn) {
                sendBtn.addEventListener('click', () => {
                    const inputField = document.getElementById('inputField');
                    if (inputField) {
                        sendMessage(inputField.value);
                    }
                });
            }

            // Hamburger Menu
            const hamburger = document.getElementById('hamburger');
            if (hamburger) {
                hamburger.addEventListener('click', openSidebar);
            }

            // Sidebar Overlay
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }

            // Uploader Button
            const uploaderBtn = document.getElementById('uploaderBtn');
            if (uploaderBtn) {
                uploaderBtn.addEventListener('click', toggleUploaderMenu);
            }

            // App Connection Button
            const appConnectionBtn = document.getElementById('appConnectionBtn');
            if (appConnectionBtn) {
                appConnectionBtn.addEventListener('click', toggleAppMenu);
            }

            // Modal Close
            const settingsModal = document.getElementById('settingsModal');
            if (settingsModal) {
                settingsModal.addEventListener('click', (e) => {
                    if (e.target === settingsModal) {
                        closeModal('settingsModal');
                    }
                });
            }

            // Close menus on outside click
            document.addEventListener('click', (e) => {
                const uploaderMenu = document.getElementById('uploaderMenu');
                const uploaderBtn = document.getElementById('uploaderBtn');
                const appMenu = document.getElementById('appMenu');
                const appConnectionBtn = document.getElementById('appConnectionBtn');

                if (uploaderMenu && uploaderBtn && !uploaderBtn.contains(e.target) && !uploaderMenu.contains(e.target)) {
                    uploaderMenu.classList.add('hidden');
                }

                if (appMenu && appConnectionBtn && !appConnectionBtn.contains(e.target) && !appMenu.contains(e.target)) {
                    appMenu.classList.add('hidden');
                }
            });
        }

        // ==================== INITIALIZATION ====================
        function initializeApp() {
            loadState();

            const app = document.getElementById('app');
            const loading = document.getElementById('loading');

            if (app && loading) {
                app.innerHTML = createAppHTML();
                app.classList.remove('hidden');
                loading.classList.add('hidden');

                // Initialize state
                if (state.chats.length === 0) {
                    createNewChat();
                }

                if (!state.currentChatId) {
                    state.currentChatId = state.chats[0]?.id;
                }

                // Render initial UI
                applyDarkMode();
                renderChatList();
                renderMessages();

                // Attach event listeners
                attachEventListeners();

                console.log('App initialized successfully');
            }
        }

        // Wait for DOM to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
