<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#1e1f22',
                            sidebar: '#e3e3e3',
                            sidebarDark: '#2b2d31',
                            blue: '#1a73e8'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Markdown Prose Styling */
        .prose p { margin-bottom: 0.75rem; line-height: 1.6; }
        .prose pre { 
            background-color: #1e293b; color: #f8fafc; 
            padding: 1rem; border-radius: 0.5rem; 
            overflow-x: auto; margin-bottom: 1rem;
            font-family: monospace; font-size: 0.875rem;
        }
        .prose code { 
            background-color: rgba(100,116,139,0.2); 
            padding: 0.125rem 0.25rem; border-radius: 0.25rem;
            font-family: monospace; font-size: 0.875rem;
        }
        .prose pre code { background-color: transparent; padding: 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose strong { font-weight: 600; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        
        /* Auto-resize textarea */
        textarea { resize: none; overflow-y: hidden; }

        /* Utility to prevent UI shifts */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-dark text-gray-900 dark:text-gray-100 antialiased overflow-hidden">

    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gemini-dark z-[100]">
        <div class="flex flex-col items-center">
            <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <div class="text-lg font-medium">Loading App...</div>
        </div>
    </div>

    <div id="app" class="hidden flex min-h-[100dvh] w-full relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-gemini-light dark:bg-gemini-sidebarDark border-r border-gray-200 dark:border-gray-800 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <h1 class="text-xl font-semibold tracking-tight">AI Chat</h1>
                <button id="close-sidebar-btn" class="md:hidden p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-4 pb-4">
                <button id="new-chat-btn" class="w-full flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-full py-2.5 px-4 font-medium transition-colors shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3">
                <div class="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 px-2 uppercase tracking-wider">Recent</div>
                <ul id="chat-list" class="space-y-1">
                    </ul>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 h-[100dvh] relative bg-white dark:bg-gemini-dark">
            
            <header class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-800 sticky top-0 bg-white/80 dark:bg-gemini-dark/80 backdrop-blur-md z-10">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar-btn" class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 md:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h2 id="current-chat-title" class="text-lg font-medium truncate">New Chat</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="theme-toggle-btn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800" title="Toggle Dark Mode">
                        <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <button id="open-settings-btn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800" title="Settings">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32 w-full max-w-4xl mx-auto scroll-smooth">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center text-gray-500">
                    <div class="w-16 h-16 mb-4 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-semibold mb-2 text-gray-800 dark:text-gray-200">How can I help today?</h2>
                    <p class="max-w-md mx-auto">Enter an API key in settings, type a message below, and start chatting.</p>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white dark:from-gemini-dark dark:via-gemini-dark to-transparent pt-6 pb-4 px-4">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative flex items-end bg-gray-100 dark:bg-gray-800 rounded-3xl border border-gray-200 dark:border-gray-700 shadow-sm focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                        <textarea id="message-input" rows="1" class="w-full max-h-48 py-3.5 pl-5 pr-12 bg-transparent border-0 focus:ring-0 resize-none text-base outline-none disabled:opacity-50" placeholder="Message..." required></textarea>
                        <button type="submit" id="send-btn" class="absolute right-2 bottom-1.5 p-2 rounded-full text-white bg-black dark:bg-white dark:text-black hover:opacity-80 disabled:opacity-30 disabled:cursor-not-allowed transition-opacity">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </form>
                    <div class="text-center text-xs text-gray-400 mt-2">Responses may be inaccurate. Verify important info.</div>
                </div>
            </div>

        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden transform transition-all">
            <div class="p-5 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                <h3 class="text-lg font-semibold">Settings</h3>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-800 dark:hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="api-key-input" class="w-full p-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free" value="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="You are a helpful AI assistant."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-gray-200 dark:border-gray-800 flex justify-end">
                <button id="save-settings-btn" class="bg-black text-white dark:bg-white dark:text-black px-5 py-2 rounded-lg font-medium hover:opacity-90 transition-opacity">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. State Management ---
            const STORAGE_KEY = 'universal_ai_chat_data';
            const defaultSettings = {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, concise AI assistant.',
                darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches
            };

            let state = {
                chats: [],
                currentChatId: null,
                settings: { ...defaultSettings }
            };

            // --- 2. DOM Elements ---
            const els = {
                loading: document.getElementById('loading'),
                app: document.getElementById('app'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                openSidebarBtn: document.getElementById('openSidebar-btn') || document.getElementById('open-sidebar-btn'),
                closeSidebarBtn: document.getElementById('close-sidebar-btn'),
                newChatBtn: document.getElementById('new-chat-btn'),
                chatList: document.getElementById('chat-list'),
                chatContainer: document.getElementById('chat-container'),
                emptyState: document.getElementById('empty-state'),
                currentChatTitle: document.getElementById('current-chat-title'),
                chatForm: document.getElementById('chat-form'),
                messageInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                themeToggleBtn: document.getElementById('theme-toggle-btn'),
                settingsModal: document.getElementById('settings-modal'),
                openSettingsBtn: document.getElementById('open-settings-btn'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                apiKeyInput: document.getElementById('api-key-input'),
                modelInput: document.getElementById('model-input'),
                systemPromptInput: document.getElementById('system-prompt-input')
            };

            // --- 3. Initialization ---
            function init() {
                loadState();
                applyTheme();
                
                if (state.chats.length === 0) {
                    createNewChat();
                } else {
                    if (!state.currentChatId || !state.chats.find(c => c.id === state.currentChatId)) {
                        state.currentChatId = state.chats[0].id;
                    }
                }
                
                renderSidebar();
                renderCurrentChat();
                setupEventListeners();

                // Hide loader, show app
                els.loading.style.display = 'none';
                els.app.classList.remove('hidden');
            }

            // --- 4. Persistence ---
            function loadState() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        state.chats = parsed.chats || [];
                        state.currentChatId = parsed.currentChatId || null;
                        state.settings = { ...defaultSettings, ...(parsed.settings || {}) };
                    }
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }

            function saveState() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {
                    console.error("Failed to save state", e);
                }
            }

            // --- 5. UI Functions ---
            function applyTheme() {
                if (state.settings.darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }

            function toggleTheme() {
                state.settings.darkMode = !state.settings.darkMode;
                applyTheme();
                saveState();
            }

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
                });
            }

            function toggleSidebar(show) {
                if (show) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                } else {
                    els.sidebar.classList.add('-translate-x-full');
                    els.sidebarOverlay.classList.add('hidden');
                }
            }

            function autoResizeTextarea() {
                els.messageInput.style.height = 'auto';
                els.messageInput.style.height = (els.messageInput.scrollHeight) + 'px';
                if (els.messageInput.value === '') {
                    els.messageInput.style.height = 'auto';
                }
            }

            // --- 6. Chat Logic ---
            function generateId() {
                return Math.random().toString(36).substring(2, 15);
            }

            function createNewChat() {
                const newChat = {
                    id: generateId(),
                    title: 'New Chat',
                    messages: [],
                    updatedAt: Date.now()
                };
                state.chats.unshift(newChat);
                state.currentChatId = newChat.id;
                saveState();
                renderSidebar();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar(false);
            }

            function deleteChat(id, e) {
                e.stopPropagation();
                if (!confirm('Delete this chat?')) return;
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.currentChatId === id) {
                    state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
                }
                if (state.chats.length === 0) createNewChat();
                saveState();
                renderSidebar();
                renderCurrentChat();
            }

            function renameChat(id, e) {
                e.stopPropagation();
                const chat = state.chats.find(c => c.id === id);
                if (!chat) return;
                const newTitle = prompt('Enter new chat name:', chat.title);
                if (newTitle && newTitle.trim()) {
                    chat.title = newTitle.trim();
                    saveState();
                    renderSidebar();
                    if (state.currentChatId === id) els.currentChatTitle.textContent = chat.title;
                }
            }

            function getCurrentChat() {
                return state.chats.find(c => c.id === state.currentChatId);
            }

            // --- 7. Rendering ---
            function renderSidebar() {
                els.chatList.innerHTML = '';
                state.chats.sort((a, b) => b.updatedAt - a.updatedAt).forEach(chat => {
                    const li = document.createElement('li');
                    const isActive = chat.id === state.currentChatId;
                    
                    li.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${
                        isActive ? 'bg-gray-200 dark:bg-gray-700' : 'hover:bg-gray-100 dark:hover:bg-gray-800'
                    }`;
                    
                    li.innerHTML = `
                        <div class="flex items-center gap-2 truncate flex-1" onclick="window.selectChat('${chat.id}')">
                            <svg class="w-4 h-4 text-gray-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                            <span class="text-sm truncate select-none">${chat.title}</span>
                        </div>
                        <div class="hidden group-hover:flex items-center gap-1 shrink-0 ml-2">
                            <button onclick="window.renameChat('${chat.id}', event)" class="p-1 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" title="Rename"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                            <button onclick="window.deleteChat('${chat.id}', event)" class="p-1 text-gray-400 hover:text-red-500" title="Delete"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    `;
                    els.chatList.appendChild(li);
                });
            }

            function renderCurrentChat() {
                const chat = getCurrentChat();
                if (!chat) return;
                
                els.currentChatTitle.textContent = chat.title;
                els.chatContainer.innerHTML = '';
                
                if (chat.messages.length === 0) {
                    els.chatContainer.appendChild(els.emptyState);
                    els.emptyState.style.display = 'flex';
                } else {
                    els.emptyState.style.display = 'none';
                    chat.messages.forEach(msg => appendMessageDOM(msg.role, msg.content));
                }
                scrollToBottom();
            }

            function appendMessageDOM(role, content) {
                const isUser = role === 'user';
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full mb-6 ${isUser ? 'justify-end' : 'justify-start'}`;
                
                const inner = document.createElement('div');
                inner.className = `max-w-[85%] md:max-w-[75%] rounded-2xl px-5 py-3.5 ${
                    isUser 
                        ? 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-br-sm' 
                        : 'bg-transparent text-gray-900 dark:text-gray-100 prose prose-sm md:prose-base dark:prose-invert'
                }`;
                
                if (isUser) {
                    inner.textContent = content; // Safe raw text for user
                } else {
                    inner.innerHTML = marked.parse(content); // Render markdown for AI
                }
                
                wrapper.appendChild(inner);
                els.chatContainer.appendChild(wrapper);
                return inner;
            }

            // --- 8. API & Streaming ---
            async function handleSend(e) {
                if (e) e.preventDefault();
                
                const text = els.messageInput.value.trim();
                if (!text) return;
                if (!state.settings.apiKey) {
                    alert("Please set your OpenRouter API Key in settings first.");
                    openSettings();
                    return;
                }

                const chat = getCurrentChat();
                if (!chat) return;

                // 1. Add User Message
                chat.messages.push({ role: 'user', content: text });
                chat.updatedAt = Date.now();
                
                // Auto-generate title if first message
                if (chat.messages.length === 1) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                    renderSidebar();
                }

                els.emptyState.style.display = 'none';
                appendMessageDOM('user', text);
                
                els.messageInput.value = '';
                autoResizeTextarea();
                scrollToBottom();
                saveState();

                // 2. Prepare API Request
                els.sendBtn.disabled = true;
                els.messageInput.disabled = true;

                const apiMessages = [];
                if (state.settings.systemPrompt) {
                    apiMessages.push({ role: 'system', content: state.settings.systemPrompt });
                }
                chat.messages.forEach(m => apiMessages.push(m));

                // 3. Create placeholder for Assistant message
                const assistantContainer = appendMessageDOM('assistant', '<div class="flex space-x-1 items-center h-6"><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div><div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div></div>');
                scrollToBottom();

                let fullResponse = '';

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: state.settings.model || 'deepseek/deepseek-r1:free',
                            messages: apiMessages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || 'API Error');
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    assistantContainer.innerHTML = ''; // clear loading dots

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n').filter(line => line.trim() !== '');
                        
                        for (const line of lines) {
                            if (line === 'data: [DONE]') continue;
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    const content = data.choices[0]?.delta?.content || '';
                                    if (content) {
                                        fullResponse += content;
                                        assistantContainer.innerHTML = marked.parse(fullResponse);
                                        scrollToBottom();
                                    }
                                } catch (err) {
                                    console.warn('Parse error on chunk', err, line);
                                }
                            }
                        }
                    }

                    // Save Assistant Message
                    chat.messages.push({ role: 'assistant', content: fullResponse });
                    chat.updatedAt = Date.now();
                    saveState();
                    renderSidebar(); // update order

                } catch (error) {
                    console.error('Chat Error:', error);
                    assistantContainer.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
                } finally {
                    els.sendBtn.disabled = false;
                    els.messageInput.disabled = false;
                    els.messageInput.focus();
                }
            }

            // --- 9. Settings ---
            function openSettings() {
                els.apiKeyInput.value = state.settings.apiKey;
                els.modelInput.value = state.settings.model;
                els.systemPromptInput.value = state.settings.systemPrompt;
                els.settingsModal.classList.remove('hidden');
            }

            function closeSettings() {
                els.settingsModal.classList.add('hidden');
            }

            function saveSettings() {
                state.settings.apiKey = els.apiKeyInput.value.trim();
                state.settings.model = els.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
                state.settings.systemPrompt = els.systemPromptInput.value.trim();
                saveState();
                closeSettings();
            }

            // --- 10. Event Listeners ---
            function setupEventListeners() {
                els.themeToggleBtn.addEventListener('click', toggleTheme);
                els.openSidebarBtn.addEventListener('click', () => toggleSidebar(true));
                els.closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
                els.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
                
                els.newChatBtn.addEventListener('click', createNewChat);
                els.chatForm.addEventListener('submit', handleSend);
                
                els.messageInput.addEventListener('input', autoResizeTextarea);
                els.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (!els.sendBtn.disabled) handleSend();
                    }
                });

                els.openSettingsBtn.addEventListener('click', openSettings);
                els.closeSettingsBtn.addEventListener('click', closeSettings);
                els.saveSettingsBtn.addEventListener('click', saveSettings);
            }

            // Global window exports for inline onclick handlers in dynamic HTML
            window.selectChat = (id) => {
                state.currentChatId = id;
                saveState();
                renderSidebar();
                renderCurrentChat();
                if (window.innerWidth < 768) toggleSidebar(false);
            };
            window.deleteChat = deleteChat;
            window.renameChat = renameChat;

            // Start App
            init();
        });
    </script>
</body>
</html>
